<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הדרך ל-50K</title>
<link rel="stylesheet" href="css/portal.css">
<style>
  /* ---------- מפת המסע · שביל מתפתל (וריאציה 2, מעודן) ---------- */
  body{background:var(--bg);padding:0 0 50px}
  .wrap{max-width:480px;margin:0 auto;padding:0 18px}

  .devbar{background:#211a0c;border:1px solid #4d3c14;color:#c9a84e;font-size:11.5px;text-align:center;padding:7px 12px;border-radius:9px;margin:12px auto 0;max-width:480px}

  .head{text-align:center;padding:30px 0 20px}
  .head .eyebrow{font-size:11px;letter-spacing:3px;color:var(--text-dim);font-weight:600;text-transform:uppercase;margin-bottom:9px}
  .head h1{font-size:31px;font-weight:800;color:var(--text-strong);letter-spacing:-.5px}
  .head .sub{font-size:13.5px;color:var(--text-dim);margin-top:7px}

  .progress-box{background:var(--surface);border-radius:16px;padding:15px 18px}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .progress-top .label{font-size:13px;color:var(--text-dim);font-weight:500}
  .progress-top .val{font-size:14px;color:var(--text-strong);font-weight:700}
  .bar{height:8px;background:var(--input-bg);border-radius:20px;overflow:hidden}
  .bar>span{display:block;height:100%;width:0;background:var(--btn-bg);border-radius:20px;transition:width .5s}

  .chapter{display:flex;align-items:center;gap:12px;margin:30px 0 12px}
  .chapter .ic{width:44px;height:44px;border-radius:12px;background:var(--surface-2);border:1px solid var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text-strong);flex-shrink:0}
  .chapter .meta .t{font-size:15px;font-weight:700;color:var(--text-strong)}
  .chapter .meta .m{font-size:12px;color:var(--text-dim);font-weight:500;margin-top:2px}
  .chapter .badge{margin-inline-start:auto;font-size:12px;font-weight:700;color:var(--btn-text);background:var(--btn-bg);padding:5px 12px;border-radius:30px}

  .path{position:relative;padding:6px 0}
  .path svg.track{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
  .nodes{position:relative;z-index:1}

  .node{display:flex;align-items:center;min-height:118px;position:relative}
  .node.p-r{justify-content:flex-start}
  .node.p-l{justify-content:flex-end}

  .circle{width:84px;height:84px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;flex-shrink:0;border:2px solid var(--surface-3);background:var(--surface);transition:transform .15s ease}
  .node:not(.locked) .circle{cursor:pointer}
  .node:not(.locked) .circle:active{transform:scale(.95)}
  .circle .num{font-size:22px;font-weight:800;color:var(--text-strong);line-height:1}
  .circle .tag{font-size:9px;color:var(--text-dim);margin-top:3px;font-weight:600}

  .node.done .circle{background:var(--surface-2);border-color:#3a4b66}
  .node.done .circle .num{color:var(--text-dim)}
  .node.done .check{position:absolute;top:-6px;inset-inline-end:-6px;width:24px;height:24px;border-radius:50%;background:var(--btn-bg);color:var(--btn-text);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}

  .node.active .circle{background:var(--btn-bg);border-color:var(--btn-bg);width:96px;height:96px}
  .node.active .circle .num{color:var(--btn-text);font-size:26px}
  .node.active .circle .tag{color:var(--text-faint)}
  .node.active .circle::before{content:"";position:absolute;inset:-7px;border-radius:50%;border:2px solid var(--surface-3)}

  .node.locked .circle{background:var(--locked-bg);border-color:var(--locked-bd)}
  .node.locked .circle .num{color:var(--locked-tx)}
  .node.locked .circle .tag{color:#2d3540}
  .node.locked .lk{position:absolute;top:-3px;inset-inline-end:-3px;width:22px;height:22px;border-radius:50%;background:var(--bg);border:1px solid var(--locked-bd);display:flex;align-items:center;justify-content:center;color:#46505e}
  .node.locked .lk svg{display:block}

  .node:not(.locked){cursor:pointer}
  .label-card{position:absolute;top:50%;transform:translateY(-50%);width:150px}
  .node.locked .label-card{pointer-events:none}
  .node.p-r .label-card{inset-inline-start:104px;text-align:start}
  .node.p-l .label-card{inset-inline-end:104px;text-align:end}
  .label-card .lt{font-size:14px;font-weight:700;color:var(--text-strong);line-height:1.3}
  .node.locked .label-card .lt{color:var(--text-faint)}
  .label-card .ls{font-size:11px;color:var(--text-faint);margin-top:3px;font-weight:500}
  .enter-pill{display:inline-block;margin-top:9px;background:var(--btn-bg);color:var(--btn-text);font-size:12px;font-weight:700;padding:8px 16px;border-radius:30px;border:none;cursor:pointer;font-family:inherit;pointer-events:auto}
  .enter-pill:active{transform:scale(.96)}

  .goal{text-align:center;margin-top:30px;padding:26px 18px;background:var(--surface);border:1px solid var(--surface-3);border-radius:18px}
  .goal .ring{width:62px;height:62px;border-radius:50%;background:var(--btn-bg);color:var(--btn-text);font-weight:800;font-size:16px;display:grid;place-items:center;margin:0 auto 8px}
  .goal .gt{font-size:18px;font-weight:800;color:var(--text-strong)}
  .goal .gs{font-size:13px;color:var(--text-dim);margin-top:4px}

  .credit{text-align:center;color:var(--text-faint);font-size:12px;margin-top:28px}
</style>
</head>
<body>

<div class="devbar">⚙️ דמו פנימי · שמות התחנות זמניים · יושלמו מתוכן הקורס</div>

<div class="wrap">
  <div class="head">
    <div class="eyebrow">מפת המסע</div>
    <h1>הדרך ל-50K</h1>
    <div class="sub">12 תחנות · 4 פרקים · צעד אחר צעד</div>
  </div>

  <div class="progress-box">
    <div class="progress-top">
      <span class="label">ההתקדמות שלך</span>
      <span class="val" id="pval">…</span>
    </div>
    <div class="bar"><span id="pfill"></span></div>
  </div>

  <div id="journey"></div>

  <div class="goal">
    <div class="ring">50K</div>
    <div class="gt">היעד · 50,000 ₪ בחודש</div>
    <div class="gs" id="goalSub">…</div>
  </div>

  <div class="credit">נבנה ע"י <b>הלל אקנין</b></div>
</div>

<script src="data/content.js"></script>
<script>
  const KEY = 'oriane_journey_progress';
  const CH = window.COURSE.chapters;
  const TOTAL = window.COURSE.totalStations;
  let done = +(localStorage.getItem(KEY) || 3);
  done = Math.max(0, Math.min(TOTAL, done));

  function go(n){ location.href = 'station.html?id=' + n; }

  // אייקון מנעול קו דק (מעודן · לא אימוג'י מצועצע)
  function lockIcon(){
    return '<span class="lk"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg></span>';
  }

  // בונה נתיב SVG מתעקל בין מרכזי הצמתים בפרק
  function buildTrack(positions){
    const NH = 118, xOf = p => p === 'r' ? 22 : 78;
    let d = '', h = positions.length * NH;
    positions.forEach((p, i) => {
      const x = xOf(p), y = i * NH + 59;
      if (i === 0) d = `M ${x} ${y}`;
      else {
        const px = xOf(positions[i-1]), my = ((i-1)*NH + 59 + y) / 2;
        d += ` C ${px} ${my}, ${x} ${my}, ${x} ${y}`;
      }
    });
    return { d, h };
  }

  function render(){
    const root = document.getElementById('journey');
    root.innerHTML = '';
    let gi = 0; // אינדקס גלובלי לזיג-זג רציף
    CH.forEach((ch, ci) => {
      const goalK = (ch.goal/1000) + 'K';
      const allDone = ch.stations.every(s => s.id <= done);
      const head = document.createElement('div');
      head.className = 'chapter';
      head.innerHTML = `<div class="ic">${goalK}</div><div class="meta"><div class="t">פרק ${ci+1} · ${ch.title}</div><div class="m">${ch.tier}</div></div>${allDone ? '<div class="badge">הושלם</div>' : ''}`;
      root.appendChild(head);

      const positions = ch.stations.map((_, i) => ((gi + i) % 2 === 0) ? 'r' : 'l');
      const { d, h } = buildTrack(positions);
      const path = document.createElement('div');
      path.className = 'path';
      path.innerHTML = `<svg class="track" viewBox="0 0 100 ${h}" preserveAspectRatio="none"><path d="${d}" fill="none" stroke="#2d3e58" stroke-width="0.7" stroke-dasharray="2.5 2.5" stroke-linecap="round"/></svg>`;
      const nodes = document.createElement('div');
      nodes.className = 'nodes';

      ch.stations.forEach((s, i) => {
        const pos = positions[i];
        const state = s.id <= done ? 'done' : (s.id === done + 1 ? 'active' : 'locked');
        const tag = state === 'active' ? 'עכשיו' : (state === 'locked' ? 'נעול' : 'תחנה');
        const mark = state === 'done' ? '<div class="check">✓</div>' : (state === 'locked' ? lockIcon() : '');
        const ls = state === 'active' ? '<div class="ls">התחנה הפעילה שלך</div>' : (s.desc ? `<div class="ls">${s.desc}</div>` : '');
        const cta = state === 'active' ? `<button class="enter-pill" onclick="go(${s.id})">היכנס לתחנה</button>` : '';
        const node = document.createElement('div');
        node.className = `node ${state} p-${pos}`;
        node.innerHTML = `
          <div class="circle"><div class="num">${s.id}</div><div class="tag">${tag}</div>${mark}</div>
          <div class="label-card"><div class="lt">${s.name}</div>${ls}${cta}</div>`;
        if (state !== 'locked') node.onclick = () => go(s.id);
        nodes.appendChild(node);
      });

      path.appendChild(nodes);
      root.appendChild(path);
      gi += ch.stations.length;
    });
    updateProgress();
  }

  function updateProgress(){
    document.getElementById('pval').textContent = `${done} / ${TOTAL} הושלמו`;
    document.getElementById('pfill').style.width = (done / TOTAL * 100) + '%';
    const left = TOTAL - done;
    document.getElementById('goalSub').textContent = left > 0 ? `עוד ${left} תחנות והגעת לפסגה` : 'הגעת לפסגה · 50K 🎉';
  }

  render();
</script>
<script src="js/theme.js"></script>
<script src="js/ai-tutor.js"></script>
</body>
</html>
