<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>כניסת מנהל · המסע ל-50K</title>
  <link rel="stylesheet" href="css/portal.css">
  <style>
    body{display:grid;place-items:center;min-height:100vh;padding:24px}
    .card{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-card);padding:30px 26px;text-align:center}
    .lock{width:54px;height:54px;border-radius:50%;background:var(--surface-2);display:grid;place-items:center;font-size:24px;margin:0 auto 14px}
    h1{font-size:20px;font-weight:800;color:var(--text-strong)}
    .sub{font-size:13px;color:var(--text-dim);margin-top:6px}
    input{width:100%;margin-top:20px;background:var(--input-bg);border:1px solid var(--line);border-radius:12px;padding:13px 15px;color:var(--text);font-family:Inter,sans-serif;font-size:15px;outline:none;text-align:center;letter-spacing:2px}
    input::placeholder{color:var(--text-faint);letter-spacing:0}
    button{width:100%;margin-top:12px;background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:var(--radius-pill);padding:14px;font-family:Inter,sans-serif;font-weight:800;font-size:15px;cursor:pointer;min-height:50px}
    .err{color:#d98a8a;font-size:13px;margin-top:10px;min-height:18px}
    .note{font-size:11.5px;color:var(--text-faint);margin-top:16px;line-height:1.6}
    .back{display:block;margin-top:14px;color:var(--text-dim);font-size:13px;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="lock">🔐</div>
    <h1>כניסת מנהל</h1>
    <div class="sub">אזור ניהול הקורס · גישה מורשית בלבד</div>
    <input id="email" type="email" placeholder="אימייל מנהל" autocomplete="off" style="text-align:center;letter-spacing:0;margin-top:14px">
    <input id="pass" type="password" placeholder="סיסמה" autocomplete="off">
    <button onclick="enter()">כניסה לדשבורד</button>
    <div class="err" id="err"></div>
    <div class="note">דמו · בגרסה המלאה הכניסה מאובטחת דרך Supabase לפי הרשאת admin בלבד.</div>
    <a class="back" href="index.html">→ חזרה למסע</a>
  </div>

  <script src="js/users.js"></script>
  <script>
    // דמו · בפרודקשן ההזדהות עוברת ל-Supabase Auth (role=admin)
    function enter(){
      var email = document.getElementById('email').value;
      var pass  = document.getElementById('pass').value;
      var u = window.authUser ? window.authUser(email, pass) : null;
      if (u && u.role === 'admin'){
        try { localStorage.setItem('oriane_user', u.email); localStorage.setItem('oriane_admin','1'); localStorage.setItem('oriane_role','admin'); } catch(e){}
        location.href = 'dashboard.html';
      } else {
        document.getElementById('err').textContent = u ? 'אין הרשאת מנהל לחשבון זה' : 'אימייל או סיסמה שגויים';
      }
    }
    document.getElementById('pass').addEventListener('keydown', function(e){ if(e.key==='Enter') enter(); });
  </script>
  <script src="js/theme.js"></script>
</body>
</html>
